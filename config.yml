baseURL: "https://britneyscripts.github.io/"
title: "Britney's Blog"
theme: "PaperMod"

pagination:
  pagerSize: 10

params:
  env: production
  defaultTheme: light # Using light mode as default for the requested colors
  
  # Global SEO configurations
  author: "Eva de Paula"
  description: "PM researching agent-driven discovery, data pipelines, and automation scripts."
  
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  
  homeInfoParams:
    Title: "Welcome to Britney's Blog"
    Content: "Senior Product Manager researching agent-readiness in e-commerce. Building real infrastructure, not selling hype. Scripts, data, and figuring out what RAG is (send help)."

  socialIcons:
    - name: twitter
      url: "https://twitter.com/britneyscripts"
    - name: linkedin
      url: "https://www.linkedin.com/in/eva-de-paula/"

  assets:
    disableHLJS: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main:
    - identifier: about
      name: About me
      url: /about/
      weight: 10
