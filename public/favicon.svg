<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .letter-b {
      fill: #8c303e; /* Borgonha clássico no tema claro */
    }
    .cursor {
      fill: #2a2e3d; /* Cinza escuro no tema claro */
    }
    @media (prefers-color-scheme: dark) {
      .letter-b {
        fill: #b83f53; /* Borgonha vibrante no tema escuro */
      }
      .cursor {
        fill: #e4e6eb; /* Branco suave no tema escuro */
      }
    }
  </style>
  <text x="18" y="72" font-family="'Fira Code', 'Roboto Mono', monospace" font-size="70" font-weight="bold">
    <tspan class="letter-b">b</tspan><tspan class="cursor">_</tspan>
  </text>
</svg>
