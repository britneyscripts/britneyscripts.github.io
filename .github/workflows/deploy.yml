name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install, build, and upload Astro site
        uses: withastro/action@v3
        with:
          node-version: 24.18.0

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
